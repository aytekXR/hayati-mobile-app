# CI — quality gate (ubuntu) + iOS build smoke (macos).
# See docs/architecture.md §9 (CI/CD) and ADR-006 (iOS-first validation/release
# sequencing, docs/architecture.md §11). Green ci.yml is a merge requirement
# (docs/project-rules.md #7). release.yml (Fastlane build/sign/TestFlight) is
# M6 — deliberately not here.
name: ci

on:
  pull_request:
    # Default types + ready_for_review: ios-build-smoke skips drafts, so the
    # workflow must re-fire when a draft is marked ready or the required check
    # would sit "expected" until the next push.
    types: [opened, synchronize, reopened, ready_for_review]
  # Push runs on main only: every change lands via a PR (agent-workflows.md W3),
  # so branch pushes are already covered by their PR run. main-only avoids
  # double-billed duplicate runs on the same commit.
  push:
    branches: [main]
  workflow_dispatch:

# Cancel a superseded run on the same ref (rapid re-push / force-push) to save
# billed minutes — but NEVER across two distinct commits on main (ADR-024 D8).
#
# Ref-keying alone was destroying the very signal this repo relies on: the
# session merges a PR (main run A starts, integration-emulator boots for ~25-50
# min), then pushes its close commit ~15 min later (session-rules §3.4). Run B
# CANCELLED run A — and run B, being docs-only, SKIPS integration-emulator
# (code_changed=false, ci-debt #17). The merged code's only post-merge verdict
# was silently lost. Two of the five main runs before this change are
# `cancelled` (3407f03, e6144ab); S023 had to hand-fire a workflow_dispatch to
# recover the verdict.
#
# So: push events key on the COMMIT (each main commit gets its own group and is
# never cancelled by the next one); everything else keys on the ref, so PR
# re-pushes still cancel their predecessor and the Session-004 billing
# protection is untouched. The extra surviving run is the docs-only one, which
# skips both 10x-billed macOS jobs by construction.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'push' && github.sha || 'ref' }}
  cancel-in-progress: true

# Least-privilege token: every job only checks out and builds — none writes to
# the repo, releases, or issues — so scope the whole workflow to read-only.
permissions:
  contents: read

env:
  # Must match local dev (past-prompts.md Session 001). Single source so all
  # jobs stay on the same pin.
  FLUTTER_VERSION: "3.44.5"

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      # ci-debt #17: 'false' only for a docs-only push to main — the signal
      # that lets the 10x-billed macOS jobs skip a run that cannot change
      # their outcome. Computed here because per-job paths filters don't
      # exist and workflow-level paths-ignore would deadlock required checks
      # (Session 002 decision, past-prompts.md).
      code_changed: ${{ steps.changes.outputs.code }}
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so the docs-only detection can diff the push's
          # before..after range (the repo is small; this costs seconds).
          fetch-depth: 0
      # ci-debt #17: PRs and manual dispatches always count as code — the
      # guard only trims docs-only pushes to main (session-close commits).
      # Unknown parents (branch's first push, force-push) fail OPEN to
      # code=true: the safe default is to run the expensive legs.
      - name: detect docs-only push
        id: changes
        run: |
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          base='${{ github.event.before }}'
          if [ "$base" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$base" 2>/dev/null; then
            echo "code=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # Everything the macOS jobs exercise; docs/, README, tool/ and
          # repo-root content/ deliberately excluded (ubuntu jobs still cover
          # them on every push).
          if git diff --quiet "$base" "${{ github.sha }}" -- app functions firebase.json firestore.rules .github/workflows; then
            echo "code=false" >> "$GITHUB_OUTPUT"
          else
            echo "code=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      # M3.1 content pipeline enforcement (test-suite.md §1-2): validator
      # self-tests, then the validator itself over content/packs/ AND the
      # bundled app/assets/content/ copies — a schema violation, a cross-pack
      # duplicate id, or authoring↔bundle drift turns this job red. Plain
      # dart:-only scripts (no pubspec), so they run before pub get.
      - name: validator self-tests
        run: dart content/validator/validate_test.dart
      - name: validate question packs
        run: dart content/validator/validate.dart
      # M6.3 store-metadata enforcement (ADR-020 D6): lint self-tests, then the
      # credential-free precheck lint over fastlane/metadata — Apple char limits,
      # required files per locale, unknown-filename hard fail. --allow-empty-urls
      # is the ratchet: drop it once the founder supplies the privacy/support URLs
      # (ADR-020 D5, operator-expected). Plain dart:-only, so pre-pub-get.
      - name: store metadata lint self-tests
        run: dart tool/store_metadata_lint_test.dart
      - name: store metadata lint
        run: dart tool/store_metadata_lint.dart --allow-empty-urls tr en-US
      # ADR-024 D1: the Slack notifier is bash, and bash gets neither
      # `dart format` (it silently ignores *.sh) nor `dart analyze`. shellcheck
      # is the static half of that gate (SC2086-class unquoted expansions); the
      # self-test is the behavioural half — it pins the noise policy, the
      # injection defence, the anti-leak sentinel, and the fail-open invariant
      # (a notifier that can red a green build is a worse defect than a missed
      # message). Both are needed; neither subsumes the other. bash+jq+python3
      # only, so they sit here with the other pre-pub-get self-tests.
      - name: shellcheck (ci scripts)
        run: shellcheck tool/ci/*.sh
      - name: slack notifier self-tests
        run: bash tool/ci/slack_notify_test.sh
      - name: pub get
        working-directory: app
        run: flutter pub get
      - name: format
        # Explicit dirs (never '.') so we don't descend into build/ or ios/ Pods.
        run: dart format --set-exit-if-changed app/lib app/test tool content
      - name: analyze
        working-directory: app
        run: flutter analyze
      - name: rtl lint
        run: dart tool/rtl_lint.dart app/lib
      - name: test
        working-directory: app
        run: flutter test --coverage
      - name: coverage gate
        # Threshold ratchets +2% per milestone (test-suite.md §3); never lowered:
        # 60 → 62 at M1 close (Session 006) → 64 at M2 close (Session 010)
        # → 66 at M3 close (Session 014).
        run: dart tool/coverage_gate.dart --min 68 app/coverage/lcov.info
      # Goldens are Linux-canonical (rendered/verified in this ubuntu job); on a
      # mismatch the comparator writes diffs to failures/ next to the test, so
      # upload them to make a red golden inspectable without re-running locally.
      - name: upload golden failure diffs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: golden-failures
          path: app/test/**/failures/*.png
          if-no-files-found: ignore
          retention-days: 7

  functions-rules:
    name: functions-rules
    # M2.1: Cloud Functions (TS) + firestore.rules suites against the auth/
    # firestore/functions emulators. PER-PR on ubuntu (unlike the 10x-billed
    # macOS integration-emulator leg): rules regressions must be pre-merge
    # signals (resume-prompt Session 007). Coverage hard-fails <80% via vitest
    # thresholds (test-suite.md §3: target 85).
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: functions/package-lock.json
      # firestore emulator needs Java 21+, discovered via PATH only (JAVA_HOME
      # is never read by firebase-tools) — setup-java prepends it to PATH.
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - name: npm ci
        working-directory: functions
        run: npm ci
      - name: lint
        working-directory: functions
        run: npm run lint
      # vitest transpiles tests via esbuild WITHOUT typechecking, and the build
      # tsconfig only covers src/ — this is the only step that typechecks test/.
      - name: typecheck (incl. tests)
        working-directory: functions
        run: npm run typecheck
      # The functions emulator never compiles TS — it require()s package.json
      # "main" (lib/index.js), so the build must land before emulators:exec.
      - name: build
        working-directory: functions
        run: npm run build
      - name: install firebase-tools (pinned to dev-box version)
        run: npm install -g firebase-tools@15.22.4
      # Same jar-cache pattern as integration-emulator, keyed per-OS.
      - name: Cache Firebase emulator jars
        uses: actions/cache@v5
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-ubuntu-fbtools-15.22.4
      - name: Pre-fetch firestore emulator jar
        run: firebase setup:emulators:firestore
      # One deterministic pass/fail (W4): emulators:exec propagates the vitest
      # exit code, which already encodes tests AND the coverage gate.
      - name: Rules + Functions tests (auth + firestore + functions emulators)
        run: |
          firebase emulators:exec --only auth,firestore,functions --project demo-hayati \
            'cd functions && npm run test:ci'

  ios-build-smoke:
    name: ios-build-smoke
    # iOS-first build smoke (ADR-006). macOS minutes bill at 10x on private
    # repos, so draft PRs (e.g. gate-proof PRs) skip it, and docs-only pushes
    # to main skip it too (ci-debt #17 — the PR run already built this code;
    # required-check semantics are untouched because PR events always run).
    # workflow_dispatch has neither a draft field nor a push base and runs.
    if: >-
      github.event.pull_request.draft != true &&
      (github.event_name != 'push' || needs.quality.outputs.code_changed == 'true')
    # Deliberate cost-over-latency choice: don't start the 10x-billed macOS
    # build until BOTH cheap ubuntu checks pass (~2-4 min added happy-path
    # latency; a red ubuntu job still blocks merge either way). functions-rules
    # added M2.1 — a rules-only regression must not start a macOS build.
    needs: [quality, functions-rules]
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: pub get
        working-directory: app
        run: flutter pub get
      - name: build ios (no codesign)
        working-directory: app
        # Explicit --target: the scaffold has no lib/main.dart — flavors are
        # Dart entrypoints (main_dev.dart / main_prod.dart, Session 001).
        run: flutter build ios --no-codesign --debug --target lib/main_dev.dart
      # ADR-020 D7 rev 2 (the S020 "native/asset config can fail silently green"
      # class): a compiling pbxproj does NOT prove the localized InfoPlist.strings
      # actually bundle — a variant group missing its Resources-build-phase entry
      # builds green and ships an EN-only Face ID prompt on TR/AR devices. Assert
      # the mechanism, not the green: the built .app must carry all three .lproj
      # copies (Xcode compiles .strings in place, same path inside the bundle).
      - name: assert localized InfoPlist.strings bundled
        working-directory: app
        run: |
          for locale in en tr ar; do
            f="build/ios/iphoneos/Runner.app/$locale.lproj/InfoPlist.strings"
            if [ ! -f "$f" ]; then
              echo "::error file=app/ios/Runner.xcodeproj/project.pbxproj::$f missing from the built bundle — the InfoPlist.strings variant group is not reaching the Resources build phase (ADR-020 D7 rev 2)." >&2
              exit 1
            fi
          done
          echo "en/tr/ar InfoPlist.strings all present in Runner.app."
      # Issue #55 (the same S020 silent-green class): a hand-wired pbxproj
      # resource can drop out of the Resources phase and still build green —
      # shipping a bundle with NO privacy manifest, a live App-Store
      # submission-rejection cause. Assert presence AND parse-validity in the
      # built bundle (the manifest is Runner-target-level, so the dev-flavor
      # build carries the same file the prod submission ships). plutil is
      # macOS-only — this step must stay in this macos job. The xml1-convert
      # before grep also covers Xcode emitting the bundled plist in binary form.
      - name: assert PrivacyInfo.xcprivacy bundled and valid
        working-directory: app
        run: |
          f="build/ios/iphoneos/Runner.app/PrivacyInfo.xcprivacy"
          if [ ! -f "$f" ]; then
            echo "::error file=app/ios/Runner.xcodeproj/project.pbxproj::$f missing from the built bundle — the manifest's PBXBuildFile is not reaching the Resources build phase (issue #55)." >&2
            exit 1
          fi
          plutil -lint "$f"
          x="$(plutil -convert xml1 -o - "$f")"
          echo "$x" | grep -q '<key>NSPrivacyTracking</key>' || { echo "::error file=app/ios/Runner/PrivacyInfo.xcprivacy::NSPrivacyTracking key missing from the bundled manifest (issue #55)." >&2; exit 1; }
          echo "$x" | grep -A1 '<key>NSPrivacyTracking</key>' | grep -q '<false/>' || { echo "::error file=app/ios/Runner/PrivacyInfo.xcprivacy::NSPrivacyTracking is not false in the bundled manifest (issue #55)." >&2; exit 1; }
          echo "$x" | grep -q '<string>CA92.1</string>' || { echo "::error file=app/ios/Runner/PrivacyInfo.xcprivacy::the CA92.1 UserDefaults required-reason entry is missing from the bundled manifest (issue #55)." >&2; exit 1; }
          echo "PrivacyInfo.xcprivacy present and valid in Runner.app (tracking=false, CA92.1 declared)."

  integration-emulator:
    name: integration-emulator
    # ci-debt #6. Full simulator debug compile + auth/firestore emulator
    # round-trips (~10-14 min wall, ~100-140 billed min at 10x macOS). Cost-
    # driven MAIN-ONLY + on-demand trigger (Session-004 billing incident;
    # resume-prompt blessing). It is a POST-MERGE signal: a broken emulator flow
    # reaches main before CI catches it, so run the suite locally before merge
    # (see integration_test/*_test.dart headers). Prove green on a PR branch via
    # `gh workflow run ci.yml --ref <branch>` (workflow_dispatch on a branch ref).
    # Docs-only pushes to main skip it (ci-debt #17, closed Session 010): a
    # session-close commit cannot change this job's outcome.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main'
       && needs.quality.outputs.code_changed == 'true')
    # Same cost-over-latency gate as ios-build-smoke: don't spend 10x-billed
    # macOS minutes until the cheap ubuntu quality job is green.
    needs: quality
    runs-on: macos-15
    # Each suite compiles its own simulator binary and they run serially, so the
    # bound is ~4 Xcode debug builds plus the emulator round-trips (auth,
    # pairing, profile, daily_question; phone_auth stays quarantined, issue #15).
    # 40 → 50 (S024): the healthy norm is 25-26 min, but a slow macOS runner ran
    # the same work ~55% longer and hit 40 exactly (run 29295078572 — all suites
    # that finished were green; the budget, not the tests, was the failure).
    timeout-minutes: 50
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      # firestore emulator needs Java 21+. macos-15 already defaults to Temurin
      # 21; pin it so a future image default-bump can't silently regress the
      # emulator (the JDK is cached on the image, so this step is ~5-10s).
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      # M2.2: the functions emulator serves the createInvite callable this
      # suite exercises. Node 20 matches functions/package.json engines.
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - name: npm ci (functions)
        working-directory: functions
        run: npm ci
      # The functions emulator never compiles TS — it require()s package.json
      # "main" (lib/index.js), so the build must land before emulators:exec.
      - name: build functions
        working-directory: functions
        run: npm run build
      - name: pub get
        working-directory: app
        run: flutter pub get
      - name: install firebase-tools (pinned to dev-box version)
        run: npm install -g firebase-tools@15.22.4
      # Cache the firestore emulator JAR (~138 MB, the only large download; the
      # auth emulator ships inside firebase-tools). Key on the firebase-tools
      # version so a pin bump re-fetches; a cache miss just re-downloads.
      - name: Cache Firebase emulator jars
        uses: actions/cache@v5
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-macos-fbtools-15.22.4
      - name: Pre-fetch firestore emulator jar
        run: firebase setup:emulators:firestore
      # Deterministic sim boot: pin Xcode 16.4, create a FRESH device on the
      # lowest available iOS runtime (18.x pairs with 16.4; the image's 26.x
      # runtimes need Xcode 26), and block until booted (no sleep). Explicit
      # -d $DEVICE_ID is required — the runner exposes macOS-desktop + the sim,
      # so flutter test cannot auto-pick.
      - name: Boot iOS simulator
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app
          RUNTIME=$(xcrun simctl list runtimes ios --json | python3 -c "import json,sys; r=[x for x in json.load(sys.stdin)['runtimes'] if x.get('isAvailable')]; r.sort(key=lambda x:[int(n) for n in x['version'].split('.')]); print(r[0]['identifier'])")
          echo "runtime=$RUNTIME"
          DEVICE_ID=$(xcrun simctl create hayati-ci 'iPhone 16' "$RUNTIME")
          xcrun simctl bootstatus "$DEVICE_ID" -b
          echo "DEVICE_ID=$DEVICE_ID" >> "$GITHUB_ENV"
      # emulators:exec starts auth+firestore, WAITS for readiness, runs the
      # script, tears the emulators down, and propagates the exit code — one
      # deterministic pass/fail, no orphans, no manual port-poll (W4: no silent
      # retries, no `|| true`). demo-hayati is credential-free (no secrets). Runs
      # from repo root (firebase.json lives here). --timeout none keeps the long
      # first-run sim compile from tripping the per-test timeout (the 30-min job
      # timeout is the real bound); -r expanded streams progress so a wedge shows.
      # One `flutter test` invocation PER SUITE, sequentially. Passing the
      # integration_test/ directory lets flutter_tools run the suites
      # concurrently against the one simulator, where they fight over the shared
      # com.hayati.app bundle: the first run died with "Unable to terminate
      # com.hayati.app" and a whole suite reported "did not complete". Suites are
      # serialized here instead; `set -e` + the explicit exit make any red suite
      # fail the job (W4: no silent retries, no `|| true`).
      #
      # DEVICE_ID reaches the inner shell through the step env (GITHUB_ENV), so
      # the single-quoted script is expanded by that shell, not this one.
      # phone_auth_emulator_test is QUARANTINED, not silently dropped: it crashes
      # the app process natively inside verifyPhoneNumber on the simulator (no
      # Dart exception, app just exits). Tracked in issue #15 with the crash
      # signature and next steps; the ::warning:: keeps it visible in every run
      # so it cannot rot unnoticed (W4: quarantine same-day with an issue, never
      # a silent retry). The phone flow stays covered by VM unit tests with fakes.
      - name: Integration tests (auth + firestore + functions emulators)
        run: |
          firebase emulators:exec --only auth,firestore,functions --project demo-hayati \
            'cd app && for suite in integration_test/*_test.dart; do
               case "$suite" in
                 */phone_auth_emulator_test.dart)
                   echo "::warning file=app/$suite::Quarantined from CI — crashes the app natively in verifyPhoneNumber on the iOS simulator (issue #15). Covered by VM unit tests."
                   continue;;
               esac
               echo "::group::$suite"
               flutter test "$suite" \
                 --dart-define=USE_AUTH_EMULATOR=true \
                 --dart-define=USE_FIRESTORE_EMULATOR=true \
                 --dart-define=USE_FUNCTIONS_EMULATOR=true \
                 -d "$DEVICE_ID" -r expanded --timeout none || exit 1
               echo "::endgroup::"
             done'

  slack-notify:
    name: slack-notify
    # ADR-024. The terminal fan-in: ONE message per run, never one per job.
    # It exists for a single event — the post-merge `integration-emulator` red,
    # which by cost design lands on main AFTER the session's attention has moved
    # on, and today has no reader at all.
    #
    # `if: always()` so it also runs when an upstream job failed or was skipped
    # (skipped != failed, and this repo skips constantly by design).
    #
    # `continue-on-error: true` is LOAD-BEARING, not decoration (ADR-024 D3): the
    # script's own exit-0 paths cannot cover a failure that happens BEFORE it
    # starts — a transient checkout error, a dead runner, the job timeout. Any of
    # those would red this job and, through it, the whole workflow run — and
    # project-rules #7 ("every push must pass the entire pipeline") would then
    # stop a session over a notifier hiccup on a perfectly green build. The
    # invariant is that this job has NO VOTE on whether the build passed.
    # It is NOT `|| true` in disguise: a failure still renders red in the Actions
    # UI and in `gh run view --log-failed`; only the cascade to the run's
    # conclusion is blocked.
    needs: [quality, functions-rules, ios-build-smoke, integration-emulator]
    if: always()
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      # The script lives in the repo (ADR-024 D1 — one tested source, not four
      # drifting copies), so this job checks out. ~5s on ubuntu.
      - uses: actions/checkout@v5
      # ONE step, no `if:`. All outcome logic (success / failure / cancelled) and
      # the noise policy live INSIDE the script, where the self-test can see them
      # (ADR-024 D2). A YAML `if:` expression is invisible to bash, so a policy
      # kept there is a policy protected by nothing.
      - name: notify slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NEEDS_JSON: ${{ toJson(needs) }}
          # Attacker-influenced text NEVER reaches a `run:` block through `${{ }}`.
          # On pull_request, head_commit does not exist — an implementer who wires
          # only the commit subject finds it blank on PRs and reaches for an
          # inline ${{ github.event.pull_request.title }}, which is the injection
          # hole. Both shapes are covered here so there is no decision left.
          COMMIT_TITLE: ${{ github.event.head_commit.message || github.event.pull_request.title || '' }}
          # On a PR, github.sha is the EPHEMERAL merge commit: it appears in no
          # branch and no git log the founder can run. Report the branch head.
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: bash tool/ci/slack_notify.sh
