# Strict analysis for Hayati (docs/resume-prompt.md M0.1; docs/test-suite.md).
#
# RTL rule (docs/architecture.md §6): logical start/end only — no hardcoded
# left/right in layout code. There is no built-in analyzer rule for this, so it
# is enforced by `dart tool/rtl_lint.dart` (repo root), which runs alongside
# `flutter analyze` locally and in CI (wired in M0.2). Escape hatch for the
# rare legitimate physical-direction use: trailing `// rtl-ok` comment.

include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"

linter:
  rules:
    - always_declare_return_types
    - avoid_bool_literals_in_conditional_expressions
    - avoid_dynamic_calls
    - avoid_slow_async_io
    - avoid_type_to_string
    - cancel_subscriptions
    - cast_nullable_to_non_nullable
    - close_sinks
    - directives_ordering
    - omit_local_variable_types
    - only_throw_errors
    - prefer_asserts_with_message
    - prefer_const_constructors
    - prefer_const_constructors_in_immutables
    - prefer_const_declarations
    - prefer_final_in_for_each
    - prefer_final_locals
    - prefer_single_quotes
    - require_trailing_commas
    - sort_pub_dependencies
    - test_types_in_equals
    - throw_in_finally
    - unawaited_futures
    - unnecessary_await_in_return
    - unnecessary_breaks
    - unnecessary_lambdas
    - unnecessary_parenthesis
    - unnecessary_statements
    - use_colored_box
    - use_enums
    - use_named_constants
    - use_string_buffers
    - use_super_parameters
