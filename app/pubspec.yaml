  firebase_core: ^4.11.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.0.3
  google_sign_in: ^7.2.0
  riverpod_annotation: ^3.0.3

dev_dependencies:
  build_runner: ^2.7.5
  firebase_core_platform_interface: ^7.1.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mocktail: ^1.0.5
  riverpod_generator: ^3.0.3

flutter:
  uses-material-design: true
