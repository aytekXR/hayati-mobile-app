name: hayati_app
description: "Hayati — the private daily ritual for two. See docs/ at the repo root."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  app_links: ^7.2.1
  cloud_firestore: ^6.6.0
  cloud_functions: ^6.3.3
  crypto: ^3.0.7
  firebase_app_check: ^0.4.5
  firebase_auth: ^6.5.4
  firebase_core: ^4.11.0
  firebase_crashlytics: ^5.2.4
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.0.3
  google_sign_in: ^7.2.0
  intl: any
  riverpod_annotation: ^3.0.3
  share_plus: ^13.2.0
  sign_in_with_apple: ^8.1.0

dev_dependencies:
  build_runner: ^2.7.5
  firebase_core_platform_interface: ^7.1.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mocktail: ^1.0.5
  riverpod_generator: ^3.0.3

flutter:
  generate: true
  uses-material-design: true
  fonts:
    - family: Rubik
      fonts:
        - asset: assets/fonts/Rubik-Regular.ttf
          weight: 400
        - asset: assets/fonts/Rubik-Medium.ttf
          weight: 500
        - asset: assets/fonts/Rubik-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Rubik-Bold.ttf
          weight: 700
    - family: Noto Sans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NotoSans-Bold.ttf
          weight: 700
    - family: Noto Sans Arabic
      fonts:
        - asset: assets/fonts/NotoSansArabic-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansArabic-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSansArabic-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NotoSansArabic-Bold.ttf
          weight: 700
